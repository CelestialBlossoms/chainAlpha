services:
  web-dashboard-api:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-web-dashboard-api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      CHAIN_ALPHA_REDIS_ENABLED: "1"
      PLUGIN_SIGNAL_STREAM_MAX_AGE_SEC: "3600"
    ports:
      - "8010:8089"
    command:
      - uvicorn
      - web_dashboard.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8089"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
