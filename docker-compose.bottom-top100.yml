services:
  bottom-top100-monitor:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-bottom-top100
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    command:
      - python
      - bottom_detection/bottom_accumulation_monitor.py
      - --watch
      - --notify
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
