services:
  bottom-top100-monitor:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-bottom-top100
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      BOTTOM_SCAN_INTERVAL: ${BOTTOM_SCAN_INTERVAL:?set BOTTOM_SCAN_INTERVAL in .env}
      BOTTOM_TREND_INTERVALS: ${BOTTOM_TREND_INTERVALS:?set BOTTOM_TREND_INTERVALS in .env}
      BOTTOM_TREND_INTERVAL_SCHEDULES: ${BOTTOM_TREND_INTERVAL_SCHEDULES:?set BOTTOM_TREND_INTERVAL_SCHEDULES in .env}
      BOTTOM_TREND_PRIMARY_INTERVAL: ${BOTTOM_TREND_PRIMARY_INTERVAL:?set BOTTOM_TREND_PRIMARY_INTERVAL in .env}
      BOTTOM_TREND_CROSS_WINDOW_DEDUP_SEC: ${BOTTOM_TREND_CROSS_WINDOW_DEDUP_SEC:?set BOTTOM_TREND_CROSS_WINDOW_DEDUP_SEC in .env}
      BOTTOM_TREND_SCHEDULER_IDLE_SLEEP_SEC: ${BOTTOM_TREND_SCHEDULER_IDLE_SLEEP_SEC:?set BOTTOM_TREND_SCHEDULER_IDLE_SLEEP_SEC in .env}
      BOTTOM_TREND_ORDER_BYS: ${BOTTOM_TREND_ORDER_BYS:?set BOTTOM_TREND_ORDER_BYS in .env}
      BOTTOM_TREND_LIMIT: ${BOTTOM_TREND_LIMIT:?set BOTTOM_TREND_LIMIT in .env}
      BOTTOM_MAX_TOKENS: ${BOTTOM_MAX_TOKENS:?set BOTTOM_MAX_TOKENS in .env}
      BOTTOM_TOP_HOLDER_LIMIT: ${BOTTOM_TOP_HOLDER_LIMIT:?set BOTTOM_TOP_HOLDER_LIMIT in .env}
      BOTTOM_RECENT_COMPARE_LIMIT: ${BOTTOM_RECENT_COMPARE_LIMIT:?set BOTTOM_RECENT_COMPARE_LIMIT in .env}
      BOTTOM_NEW_TOKEN_AGE_CUTOFF_SEC: ${BOTTOM_NEW_TOKEN_AGE_CUTOFF_SEC:?set BOTTOM_NEW_TOKEN_AGE_CUTOFF_SEC in .env}
      BOTTOM_NEW_TOKEN_SNAPSHOT_INTERVAL_SEC: ${BOTTOM_NEW_TOKEN_SNAPSHOT_INTERVAL_SEC:?set BOTTOM_NEW_TOKEN_SNAPSHOT_INTERVAL_SEC in .env}
      BOTTOM_OLD_TOKEN_SNAPSHOT_INTERVAL_SEC: ${BOTTOM_OLD_TOKEN_SNAPSHOT_INTERVAL_SEC:?set BOTTOM_OLD_TOKEN_SNAPSHOT_INTERVAL_SEC in .env}
      BOTTOM_FAST_SCAN_ENABLED: ${BOTTOM_FAST_SCAN_ENABLED:?set BOTTOM_FAST_SCAN_ENABLED in .env}
      BOTTOM_FAST_SCAN_INTERVAL_SEC: ${BOTTOM_FAST_SCAN_INTERVAL_SEC:?set BOTTOM_FAST_SCAN_INTERVAL_SEC in .env}
      BOTTOM_FAST_SCAN_MIN_MCAP: ${BOTTOM_FAST_SCAN_MIN_MCAP:?set BOTTOM_FAST_SCAN_MIN_MCAP in .env}
      BOTTOM_FAST_SCAN_MAX_MCAP: ${BOTTOM_FAST_SCAN_MAX_MCAP:?set BOTTOM_FAST_SCAN_MAX_MCAP in .env}
      BOTTOM_FAST_SCAN_SNAPSHOT_INTERVAL_SEC: ${BOTTOM_FAST_SCAN_SNAPSHOT_INTERVAL_SEC:?set BOTTOM_FAST_SCAN_SNAPSHOT_INTERVAL_SEC in .env}
      BOTTOM_FAST_SCAN_MAX_TOKENS: ${BOTTOM_FAST_SCAN_MAX_TOKENS:?set BOTTOM_FAST_SCAN_MAX_TOKENS in .env}
      BOTTOM_SIGNAL_DEDUP_MAX_AGE_SEC: ${BOTTOM_SIGNAL_DEDUP_MAX_AGE_SEC:?set BOTTOM_SIGNAL_DEDUP_MAX_AGE_SEC in .env}
      BOTTOM_FIRST_SIGNAL_BASELINE_MAX_AGE_SEC: ${BOTTOM_FIRST_SIGNAL_BASELINE_MAX_AGE_SEC:?set BOTTOM_FIRST_SIGNAL_BASELINE_MAX_AGE_SEC in .env}
      BOTTOM_FRONTEND_REPEAT_MIN_KLINE_CHANGE_PCT: ${BOTTOM_FRONTEND_REPEAT_MIN_KLINE_CHANGE_PCT:?set BOTTOM_FRONTEND_REPEAT_MIN_KLINE_CHANGE_PCT in .env}
      BOTTOM_QUIET_BREAKOUT_ENABLED: ${BOTTOM_QUIET_BREAKOUT_ENABLED:?set BOTTOM_QUIET_BREAKOUT_ENABLED in .env}
      BOTTOM_QUIET_BREAKOUT_MIN_QUIET_BARS: ${BOTTOM_QUIET_BREAKOUT_MIN_QUIET_BARS:?set BOTTOM_QUIET_BREAKOUT_MIN_QUIET_BARS in .env}
      BOTTOM_QUIET_BREAKOUT_RECENT_BARS: ${BOTTOM_QUIET_BREAKOUT_RECENT_BARS:?set BOTTOM_QUIET_BREAKOUT_RECENT_BARS in .env}
      BOTTOM_QUIET_BREAKOUT_MAX_RANGE_PCT: ${BOTTOM_QUIET_BREAKOUT_MAX_RANGE_PCT:?set BOTTOM_QUIET_BREAKOUT_MAX_RANGE_PCT in .env}
      BOTTOM_QUIET_BREAKOUT_MAX_AVG_VOLUME_USD: ${BOTTOM_QUIET_BREAKOUT_MAX_AVG_VOLUME_USD:?set BOTTOM_QUIET_BREAKOUT_MAX_AVG_VOLUME_USD in .env}
      BOTTOM_QUIET_BREAKOUT_MIN_CHANGE_PCT: ${BOTTOM_QUIET_BREAKOUT_MIN_CHANGE_PCT:?set BOTTOM_QUIET_BREAKOUT_MIN_CHANGE_PCT in .env}
      BOTTOM_QUIET_BREAKOUT_LOW_MCAP_MAX_USD: ${BOTTOM_QUIET_BREAKOUT_LOW_MCAP_MAX_USD:?set BOTTOM_QUIET_BREAKOUT_LOW_MCAP_MAX_USD in .env}
      BOTTOM_QUIET_BREAKOUT_HIGH_MCAP_MIN_USD: ${BOTTOM_QUIET_BREAKOUT_HIGH_MCAP_MIN_USD:?set BOTTOM_QUIET_BREAKOUT_HIGH_MCAP_MIN_USD in .env}
      BOTTOM_QUIET_BREAKOUT_MIN_VOLUME_RATIO: ${BOTTOM_QUIET_BREAKOUT_MIN_VOLUME_RATIO:?set BOTTOM_QUIET_BREAKOUT_MIN_VOLUME_RATIO in .env}
      BOTTOM_QUIET_BREAKOUT_MIN_BREAKOUT_VOLUME_USD: ${BOTTOM_QUIET_BREAKOUT_MIN_BREAKOUT_VOLUME_USD:?set BOTTOM_QUIET_BREAKOUT_MIN_BREAKOUT_VOLUME_USD in .env}
      BOTTOM_QUIET_RUNUP_ENABLED: ${BOTTOM_QUIET_RUNUP_ENABLED:?set BOTTOM_QUIET_RUNUP_ENABLED in .env}
      BOTTOM_QUIET_RUNUP_LOOKBACK_BARS: ${BOTTOM_QUIET_RUNUP_LOOKBACK_BARS:?set BOTTOM_QUIET_RUNUP_LOOKBACK_BARS in .env}
      BOTTOM_QUIET_RUNUP_MIN_QUIET_BARS: ${BOTTOM_QUIET_RUNUP_MIN_QUIET_BARS:?set BOTTOM_QUIET_RUNUP_MIN_QUIET_BARS in .env}
      BOTTOM_QUIET_RUNUP_MAX_RANGE_PCT: ${BOTTOM_QUIET_RUNUP_MAX_RANGE_PCT:?set BOTTOM_QUIET_RUNUP_MAX_RANGE_PCT in .env}
      BOTTOM_QUIET_RUNUP_MIN_GAIN_PCT: ${BOTTOM_QUIET_RUNUP_MIN_GAIN_PCT:?set BOTTOM_QUIET_RUNUP_MIN_GAIN_PCT in .env}
      BOTTOM_QUIET_RUNUP_MIN_BREAKOUT_VOLUME_RATIO: ${BOTTOM_QUIET_RUNUP_MIN_BREAKOUT_VOLUME_RATIO:?set BOTTOM_QUIET_RUNUP_MIN_BREAKOUT_VOLUME_RATIO in .env}
      BOTTOM_NEW_TOKEN_KLINE_RESOLUTION: ${BOTTOM_NEW_TOKEN_KLINE_RESOLUTION:?set BOTTOM_NEW_TOKEN_KLINE_RESOLUTION in .env}
      BOTTOM_YOUNG_TOKEN_KLINE_RESOLUTION: ${BOTTOM_YOUNG_TOKEN_KLINE_RESOLUTION:?set BOTTOM_YOUNG_TOKEN_KLINE_RESOLUTION in .env}
      BOTTOM_MID_TOKEN_KLINE_RESOLUTION: ${BOTTOM_MID_TOKEN_KLINE_RESOLUTION:?set BOTTOM_MID_TOKEN_KLINE_RESOLUTION in .env}
      BOTTOM_KLINE_LOOKBACK_SEC: ${BOTTOM_KLINE_LOOKBACK_SEC:?set BOTTOM_KLINE_LOOKBACK_SEC in .env}
      BOTTOM_MIN_MCAP_USD: ${BOTTOM_MIN_MCAP_USD:?set BOTTOM_MIN_MCAP_USD in .env}
      BOTTOM_MIN_TOKEN_AGE_SEC: ${BOTTOM_MIN_TOKEN_AGE_SEC:?set BOTTOM_MIN_TOKEN_AGE_SEC in .env}
      BOTTOM_MIN_FEE_SOL: ${BOTTOM_MIN_FEE_SOL:?set BOTTOM_MIN_FEE_SOL in .env}
      BOTTOM_DAILY_MCAP_MILESTONE_USD: ${BOTTOM_DAILY_MCAP_MILESTONE_USD:?set BOTTOM_DAILY_MCAP_MILESTONE_USD in .env}
      BOTTOM_DAILY_MCAP_MIN_FEE_SOL: ${BOTTOM_DAILY_MCAP_MIN_FEE_SOL:?set BOTTOM_DAILY_MCAP_MIN_FEE_SOL in .env}
      BOTTOM_LIVE_TRACK_ENABLED: ${BOTTOM_LIVE_TRACK_ENABLED:-1}
      BOTTOM_LIVE_TRACK_REDIS_PREFIX: ${BOTTOM_LIVE_TRACK_REDIS_PREFIX:-bottom:live_track}
      BOTTOM_LIVE_TRACK_TTL_SEC: ${BOTTOM_LIVE_TRACK_TTL_SEC:-28800}
      BOTTOM_LIVE_TRACK_DEAD_MCAP: ${BOTTOM_LIVE_TRACK_DEAD_MCAP:-6000}
      BOTTOM_LIVE_TRACK_LOW_MCAP: ${BOTTOM_LIVE_TRACK_LOW_MCAP:-10000}
      BOTTOM_LIVE_TRACK_LOW_WINDOW: ${BOTTOM_LIVE_TRACK_LOW_WINDOW:-1800}
    command:
      - python
      - -u
      - bottom_detection/bottom_accumulation_monitor.py
      - --watch
      - --notify
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
