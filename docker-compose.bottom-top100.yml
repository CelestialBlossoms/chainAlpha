services:
  bottom-top100-monitor:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-bottom-top100
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      BOTTOM_SCAN_INTERVAL: "300"
      BOTTOM_TREND_INTERVALS: "1h"
      BOTTOM_TREND_ORDER_BYS: "default,change1h"
      BOTTOM_TREND_LIMIT: "100"
      BOTTOM_MAX_TOKENS: "100"
      BOTTOM_TOP_HOLDER_LIMIT: "100"
      BOTTOM_RECENT_COMPARE_LIMIT: "10"
      BOTTOM_NEW_TOKEN_AGE_CUTOFF_SEC: "86400"
      BOTTOM_NEW_TOKEN_SNAPSHOT_INTERVAL_SEC: "300"
      BOTTOM_OLD_TOKEN_SNAPSHOT_INTERVAL_SEC: "900"
      BOTTOM_NEW_TOKEN_KLINE_RESOLUTION: "5m"
      BOTTOM_YOUNG_TOKEN_KLINE_RESOLUTION: "15m"
      BOTTOM_MID_TOKEN_KLINE_RESOLUTION: "1h"
      BOTTOM_KLINE_LOOKBACK_SEC: "21600"
      BOTTOM_MIN_MCAP_USD: "40000"
      BOTTOM_MIN_TOKEN_AGE_SEC: "18000"
      BOTTOM_MIN_FEE_SOL: "10"
      BOTTOM_DAILY_MCAP_MILESTONE_USD: "1000000"
      BOTTOM_DAILY_MCAP_MIN_FEE_SOL: "20"
    command:
      - python
      - bottom_detection/bottom_accumulation_monitor.py
      - --watch
      - --notify
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
