services:
  bottom-top100-monitor:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-bottom-top100
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      BOTTOM_SCAN_INTERVAL: "300"
      BOTTOM_TREND_INTERVALS: "1h"
      BOTTOM_TREND_ORDER_BYS: "default,change1h"
      BOTTOM_TREND_LIMIT: "100"
      BOTTOM_MAX_TOKENS: "100"
      BOTTOM_TOP_HOLDER_LIMIT: "100"
      BOTTOM_RECENT_COMPARE_LIMIT: "10"
      BOTTOM_NEW_TOKEN_AGE_CUTOFF_SEC: "86400"
      BOTTOM_NEW_TOKEN_SNAPSHOT_INTERVAL_SEC: "300"
      BOTTOM_OLD_TOKEN_SNAPSHOT_INTERVAL_SEC: "900"
      BOTTOM_FAST_SCAN_ENABLED: "1"
      BOTTOM_FAST_SCAN_INTERVAL_SEC: "60"
      BOTTOM_FAST_SCAN_MIN_MCAP: "100000"
      BOTTOM_FAST_SCAN_MAX_MCAP: "300000"
      BOTTOM_FAST_SCAN_SNAPSHOT_INTERVAL_SEC: "60"
      BOTTOM_FAST_SCAN_MAX_TOKENS: "0"
      BOTTOM_SIGNAL_DEDUP_MAX_AGE_SEC: "86400"
      BOTTOM_FIRST_SIGNAL_BASELINE_MAX_AGE_SEC: "86400"
      BOTTOM_FRONTEND_REPEAT_MIN_KLINE_CHANGE_PCT: "0"
      BOTTOM_QUIET_BREAKOUT_ENABLED: "1"
      BOTTOM_QUIET_BREAKOUT_MIN_QUIET_BARS: "24"
      BOTTOM_QUIET_BREAKOUT_RECENT_BARS: "3"
      BOTTOM_QUIET_BREAKOUT_MAX_RANGE_PCT: "7"
      BOTTOM_QUIET_BREAKOUT_MAX_AVG_VOLUME_USD: "2000"
      BOTTOM_QUIET_BREAKOUT_MIN_CHANGE_PCT: "10"
      BOTTOM_QUIET_BREAKOUT_LOW_MCAP_MAX_USD: "300000"
      BOTTOM_QUIET_BREAKOUT_HIGH_MCAP_MIN_USD: "1000000"
      BOTTOM_QUIET_BREAKOUT_MIN_VOLUME_RATIO: "3"
      BOTTOM_QUIET_BREAKOUT_MIN_BREAKOUT_VOLUME_USD: "5000"
      BOTTOM_QUIET_RUNUP_ENABLED: "1"
      BOTTOM_QUIET_RUNUP_LOOKBACK_BARS: "120"
      BOTTOM_QUIET_RUNUP_MIN_QUIET_BARS: "6"
      BOTTOM_QUIET_RUNUP_MAX_RANGE_PCT: "10"
      BOTTOM_QUIET_RUNUP_MIN_GAIN_PCT: "80"
      BOTTOM_QUIET_RUNUP_MIN_BREAKOUT_VOLUME_RATIO: "3"
      BOTTOM_NEW_TOKEN_KLINE_RESOLUTION: "5m"
      BOTTOM_YOUNG_TOKEN_KLINE_RESOLUTION: "5m"
      BOTTOM_MID_TOKEN_KLINE_RESOLUTION: "5m"
      BOTTOM_KLINE_LOOKBACK_SEC: "21600"
      BOTTOM_MIN_MCAP_USD: "40000"
      BOTTOM_MIN_TOKEN_AGE_SEC: "18000"
      BOTTOM_MIN_FEE_SOL: "10"
      BOTTOM_DAILY_MCAP_MILESTONE_USD: "1000000"
      BOTTOM_DAILY_MCAP_MIN_FEE_SOL: "20"
    command:
      - python
      - bottom_detection/bottom_accumulation_monitor.py
      - --watch
      - --notify
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
