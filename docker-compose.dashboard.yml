services:
  tg-dashboard:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-tg-dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      CHAIN_ALPHA_REDIS_ENABLED: "1"
      TG_ALERT_STREAM_KEY: chain_alpha:tg_alerts
      TG_ALERT_STREAM_MAX_AGE_SEC: "3600"
      PLUGIN_SIGNAL_STREAM_KEY: chain_alpha:plugin_signals
      PLUGIN_SIGNAL_STREAM_MAX_AGE_SEC: "21600"
      DEEP_ALPHA_LIVE_TRACK_ENABLED: ${DEEP_ALPHA_LIVE_TRACK_ENABLED:-1}
      DEEP_ALPHA_LIVE_TRACK_REDIS_PREFIX: ${DEEP_ALPHA_LIVE_TRACK_REDIS_PREFIX:-deep_alpha:live_track}
      DEEP_ALPHA_LIVE_TRACK_TTL_SEC: ${DEEP_ALPHA_LIVE_TRACK_TTL_SEC:-86400}
      DEEP_ALPHA_LIVE_TRACK_REFRESH_SEC: ${DEEP_ALPHA_LIVE_TRACK_REFRESH_SEC:-30}
      DEEP_ALPHA_LIVE_TRACK_DEAD_MCAP: ${DEEP_ALPHA_LIVE_TRACK_DEAD_MCAP:-6000}
      DEEP_ALPHA_LIVE_TRACK_LOW_MCAP: ${DEEP_ALPHA_LIVE_TRACK_LOW_MCAP:-10000}
      DEEP_ALPHA_LIVE_TRACK_LOW_WINDOW: ${DEEP_ALPHA_LIVE_TRACK_LOW_WINDOW:-1800}
      DEEP_ALPHA_LIVE_TRACK_MAX_WORKERS: ${DEEP_ALPHA_LIVE_TRACK_MAX_WORKERS:-4}
      DEEP_ALPHA_SMART_ONLY_ENABLED: ${DEEP_ALPHA_SMART_ONLY_ENABLED:-1}
      DEEP_ALPHA_SMART_SIGNAL_MCAP_MIN: ${DEEP_ALPHA_SMART_SIGNAL_MCAP_MIN:-10000}
      DEEP_ALPHA_MARKET_SIGNAL_REDIS_PREFIX: ${DEEP_ALPHA_MARKET_SIGNAL_REDIS_PREFIX:-deep_alpha:market_signal}
      DEEP_ALPHA_MARKET_SIGNAL_MAX_DRAWDOWN_PCT: ${DEEP_ALPHA_MARKET_SIGNAL_MAX_DRAWDOWN_PCT:-50}
      BOTTOM_LIVE_TRACK_ENABLED: ${BOTTOM_LIVE_TRACK_ENABLED:-1}
      BOTTOM_LIVE_TRACK_BG_ENABLED: ${BOTTOM_LIVE_TRACK_BG_ENABLED:-0}
      BOTTOM_LIVE_TRACK_REDIS_PREFIX: ${BOTTOM_LIVE_TRACK_REDIS_PREFIX:-bottom:live_track}
      BOTTOM_LIVE_TRACK_TTL_SEC: ${BOTTOM_LIVE_TRACK_TTL_SEC:-43200}
      BOTTOM_LIVE_TRACK_REFRESH_SEC: ${BOTTOM_LIVE_TRACK_REFRESH_SEC:-30}
      BOTTOM_LIVE_TRACK_DEAD_MCAP: ${BOTTOM_LIVE_TRACK_DEAD_MCAP:-6000}
      BOTTOM_LIVE_TRACK_LOW_MCAP: ${BOTTOM_LIVE_TRACK_LOW_MCAP:-10000}
      BOTTOM_LIVE_TRACK_LOW_WINDOW: ${BOTTOM_LIVE_TRACK_LOW_WINDOW:-1800}
      BOTTOM_LIVE_TRACK_MAX_WORKERS: ${BOTTOM_LIVE_TRACK_MAX_WORKERS:-4}
      BOTTOM_LIVE_TRACK_KLINE_REFRESH_SEC: ${BOTTOM_LIVE_TRACK_KLINE_REFRESH_SEC:-14400}
      BOTTOM_LIVE_TRACK_KLINE_WINDOW_SEC: ${BOTTOM_LIVE_TRACK_KLINE_WINDOW_SEC:-43200}
    ports:
      - "8010:8089"
    command:
      - uvicorn
      - web_dashboard.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8089"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  bottom-live-track-worker:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-bottom-live-track-worker
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      CHAIN_ALPHA_REDIS_ENABLED: "1"
      BOTTOM_LIVE_TRACK_ENABLED: ${BOTTOM_LIVE_TRACK_ENABLED:-1}
      BOTTOM_LIVE_TRACK_REDIS_PREFIX: ${BOTTOM_LIVE_TRACK_REDIS_PREFIX:-bottom:live_track}
      BOTTOM_LIVE_TRACK_TTL_SEC: ${BOTTOM_LIVE_TRACK_TTL_SEC:-43200}
      BOTTOM_LIVE_TRACK_REFRESH_SEC: ${BOTTOM_LIVE_TRACK_REFRESH_SEC:-30}
      BOTTOM_LIVE_TRACK_DEAD_MCAP: ${BOTTOM_LIVE_TRACK_DEAD_MCAP:-6000}
      BOTTOM_LIVE_TRACK_LOW_MCAP: ${BOTTOM_LIVE_TRACK_LOW_MCAP:-10000}
      BOTTOM_LIVE_TRACK_LOW_WINDOW: ${BOTTOM_LIVE_TRACK_LOW_WINDOW:-1800}
      BOTTOM_LIVE_TRACK_MAX_WORKERS: ${BOTTOM_LIVE_TRACK_MAX_WORKERS:-4}
      BOTTOM_LIVE_TRACK_KLINE_REFRESH_SEC: ${BOTTOM_LIVE_TRACK_KLINE_REFRESH_SEC:-14400}
      BOTTOM_LIVE_TRACK_KLINE_WINDOW_SEC: ${BOTTOM_LIVE_TRACK_KLINE_WINDOW_SEC:-43200}
    command:
      - python
      - -u
      - -m
      - web_dashboard.bottom_live_track_worker
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
