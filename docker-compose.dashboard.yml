services:
  tg-dashboard:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-tg-dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      TG_ALERT_STREAM_KEY: chain_alpha:tg_alerts
    ports:
      - "8089:8089"
    command:
      - uvicorn
      - web_dashboard.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8089"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
