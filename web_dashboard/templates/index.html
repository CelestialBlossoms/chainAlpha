<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>热门代币自动检索</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <div class="page">
    <div class="wrap">
      <header class="topbar">
        <div>
          <h1>热门代币自动检索</h1>
          <p class="desc">实时读取结构化报警数据，按代币去重展示最新信号。Stream: {{ stream_key }}</p>
        </div>
        <div class="nav-actions">
          <a class="mini-link" href="/bottom-watchlist">重点CA异动</a>
          <a class="mini-link" href="/onchain-guides">链上交易指南</a>
        </div>
        <div class="live">
          <span id="conn-dot" class="dot idle"></span>
          <span id="conn-text">连接中</span>
        </div>
      </header>

      <section id="quick-ca" class="card quick-ca">
        <div>
          <span class="quick-label">最新CA</span>
          <b id="quick-symbol">-</b>
          <code id="quick-address">等待新消息</code>
        </div>
        <div class="quick-actions">
          <button id="quick-copy" class="mini-btn" type="button">复制</button>
          <a id="quick-gmgn" class="mini-link" href="https://gmgn.ai/" target="_blank" rel="noreferrer">GMGN</a>
          <a id="quick-dex" class="mini-link" href="https://dexscreener.com/" target="_blank" rel="noreferrer">DexScreener</a>
        </div>
      </section>

      <button id="bottom-alert-banner" class="bottom-alert-banner" type="button" hidden>
        <span class="bottom-alert-title">新底部代币异动</span>
        <span id="bottom-alert-text" class="bottom-alert-text">点击查看最新底部代币异动</span>
        <span class="bottom-alert-action">查看</span>
      </button>

      <section class="controls">
        <input id="query" class="search" type="search" placeholder="搜索 Symbol / CA / 叙事 / 状态">
        <select id="sort" class="sort-select">
          <option value="time_desc">最新优先</option>
          <option value="mcap_desc">市值高到低</option>
          <option value="change_desc">涨幅高到低</option>
          <option value="holders_desc">持有人高到低</option>
        </select>
        <div class="tabs">
          <button class="tab active" type="button" data-tab="all">全部</button>
          <button class="tab" type="button" data-tab="bottom">底部代币异动</button>
          <button class="tab" type="button" data-tab="daily1m">每日1M</button>
          <button id="clear-btn" class="clear-btn" type="button">清空页面</button>
        </div>
      </section>

      <section id="card-grid" class="card-grid"></section>
      <div id="empty" class="empty" hidden>没有结构化报警数据</div>
    </div>
  </div>

  <script>
    const grid = document.querySelector("#card-grid");
    const empty = document.querySelector("#empty");
    const queryInput = document.querySelector("#query");
    const sortSelect = document.querySelector("#sort");
    const clearBtn = document.querySelector("#clear-btn");
    const quickSymbol = document.querySelector("#quick-symbol");
    const quickAddress = document.querySelector("#quick-address");
    const quickCopy = document.querySelector("#quick-copy");
    const quickGmgn = document.querySelector("#quick-gmgn");
    const quickDex = document.querySelector("#quick-dex");
    const bottomAlertBanner = document.querySelector("#bottom-alert-banner");
    const bottomAlertText = document.querySelector("#bottom-alert-text");
    const dot = document.querySelector("#conn-dot");
    const connText = document.querySelector("#conn-text");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const MAX_VISIBLE_SIGNALS = 10;
    const SIGNAL_VISIBLE_MS = 30 * 60 * 1000;
    const EXPIRE_CHECK_MS = 30 * 1000;
    const state = {
      byAddress: new Map(),
      seenIds: new Set(),
      tab: "all",
      expandedTokenId: "",
      flashed: new Set(),
      pendingBottomAddress: "",
      pendingBottomCount: 0,
    };

    function safeNum(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function htmlEscape(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function formatCap(value) {
      const n = safeNum(value);
      if (Math.abs(n) >= 1000000) return `$${(n / 1000000).toFixed(2)}M`;
      if (Math.abs(n) >= 1000) return `$${(n / 1000).toFixed(1)}K`;
      return `$${Math.round(n)}`;
    }

    function formatPct(value) {
      const n = safeNum(value);
      return `${n > 0 ? "+" : ""}${n.toFixed(1)}%`;
    }

    function shortAddress(address) {
      const value = String(address || "");
      if (value.length <= 16) return value || "-";
      return `${value.slice(0, 6)}...${value.slice(-6)}`;
    }

    function signalBaseMs(signal) {
      const ms = safeNum(signal && signal.ts) * 1000;
      return ms > 0 ? ms : Date.now();
    }

    function isSignalExpired(signal, now = Date.now()) {
      return safeNum(signal && signal.visibleUntilMs) > 0 && safeNum(signal.visibleUntilMs) <= now;
    }

    function pruneExpiredSignals() {
      const now = Date.now();
      let changed = false;
      for (const [address, signal] of state.byAddress.entries()) {
        if (!isSignalExpired(signal, now)) continue;
        state.byAddress.delete(address);
        state.flashed.delete(address);
        if (state.expandedTokenId === address) state.expandedTokenId = "";
        if (state.pendingBottomAddress === address) {
          state.pendingBottomAddress = "";
          state.pendingBottomCount = 0;
        }
        changed = true;
      }
      return changed;
    }

    function gmgnUrl(signal) {
      if (!signal || !signal.address) return "https://gmgn.ai/";
      return `https://gmgn.ai/${signal.chain || "sol"}/token/${signal.address}`;
    }

    function binanceUrl(signal) {
      if (!signal || !signal.address) return "https://web3.binance.com/zh-CN";
      return `https://web3.binance.com/zh-CN/token/sol/${signal.address}?ref=NHQT72EV`;
    }

    function solscanUrl(signal) {
      if (!signal || !signal.address) return "https://solscan.io/";
      return `https://solscan.io/token/${signal.address}`;
    }

    function dexUrl(signal) {
      if (!signal || !signal.address) return "https://dexscreener.com/";
      return `https://dexscreener.com/solana/${signal.address}`;
    }

    async function copyAddress(address) {
      if (!address) return;
      try {
        await navigator.clipboard.writeText(address);
      } catch (_) {
        const area = document.createElement("textarea");
        area.value = address;
        area.style.position = "fixed";
        area.style.opacity = "0";
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    }

    function fmtTime(ts) {
      const ms = safeNum(ts) * 1000;
      if (!ms) return "";
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit",
        hour12: false,
      }).format(new Date(ms));
    }

    function fmtAge(seconds) {
      const value = safeNum(seconds);
      if (value <= 0) return "-";
      if (value < 24 * 60 * 60) return `${(value / 3600).toFixed(1)}小时`;
      return `${(value / 86400).toFixed(1)}天`;
    }

    function isRecentDaily1m(item) {
      const ts = safeNum(item && item.ts);
      if (!ts) return false;
      return Date.now() / 1000 - ts <= 48 * 60 * 60;
    }

    function tag(stats, key) {
      return (stats.holder_tag_stats && stats.holder_tag_stats[key]) || {};
    }

    function topSummary(stats, prefix) {
      const bucketKey = prefix === "top10" ? "10" : "100";
      const bucket = (stats.rank_bucket_stats && stats.rank_bucket_stats[bucketKey]) || {};
      return {
        hold: safeNum(bucket.supply ?? stats[`${prefix}_holder_supply`] ?? stats[`${prefix}_supply`] ?? stats[`${prefix}_rate`]),
        value: safeNum(bucket.position_value ?? stats[`${prefix}_position_value`] ?? stats[`${prefix}_value`]),
        profit: safeNum(bucket.profit_pct ?? stats[`${prefix}_profit_pct`]),
        sold: safeNum(bucket.sell_progress ?? stats[`${prefix}_sell_progress`]),
      };
    }

    function normalizeItem(item) {
      const extra = item.extra || {};
      const source = item.source || "";

      if (source === "bottom_abnormal") {
        const address = extra.address || item.ca || "";
        if (!address) return null;
        const signalType = extra.signal_type || "watch";

        // EMA golden cross is a special bottom signal
        if (signalType === "ema_golden_cross") {
          return {
            id: item.id, ts: safeNum(item.ts), time: fmtTime(item.ts),
            source: item.source || "", status: item.status || "", address, chain: "sol",
            symbol: extra.symbol || item.title || "UNKNOWN", name: "",
            narrative: extra.narrative || extra.narrative_desc || `EMA金叉: EMA9上穿EMA26 (${extra.strength || "normal"})`,
            mcap: safeNum(extra.current_mcap), holders: safeNum(extra.holder_count), feeSol: 0, tradeVolume: 0,
            priceChange: 0, wave: `EMA9=${extra.ema9?.toFixed(10)}`, drawdown: 0,
            repeatCount: 1, repeatType: "EMA金叉",
            capPath: `EMA26下方${extra.bars_below || 0}根后金叉`, holderDelta: 0,
            pool: "", liquidity: safeNum(extra.pool_liquidity),
            createdTime: fmtTime(extra.created_ts), age: fmtAge(extra.age_sec), verdict: "ema_golden_cross",
            trend: {}, tags: {}, top10: {}, top100: {}, bottomProfit: {},
            rawText: item.text || "", rawStats: extra,
            isNew: false, isBottom: true,
            narrativeType: extra.narrative_type || "",
            athMcap: 0, abnormalRule: `EMA9×EMA26金叉`,
            poolMcapRatio: safeNum(extra.pool_mcap_ratio),
            firstSignalMcap: safeNum(extra.first_signal_mcap),
            firstSignalTs: safeNum(extra.first_signal_ts),
            firstSignalTime: fmtTime(extra.first_signal_ts || item.ts),
            firstSignalChangePct: safeNum(extra.first_signal_change_pct),
            firstSignalDeltaMcap: safeNum(extra.first_signal_delta_mcap),
          poolMcapRatioText: "", accumulationPct: 0, distributionPct: 0, netflowUsd: 0,
          top20Pct: 0, top50Pct: 0, top100Pct: 0,
          historyCount: 0, reasons: [`EMA9(${extra.ema9?.toFixed(10)}) 上穿 EMA26(${extra.ema26?.toFixed(10)})`],
          };
        }

        const poolLiquidity = safeNum(extra.pool_total_liquidity);
        const poolMcapRatio = safeNum(extra.pool_mcap_ratio);
        const isQuietBreakout = signalType === "quiet_breakout" || signalType === "quiet_runup";
        if (signalType === "watch" || (!isQuietBreakout && (poolLiquidity < 4000 || poolMcapRatio < 0.10))) return null;
        const isAbnormal = signalType === "abnormal" || signalType === "new_revival";
        const bottomVerdict = signalType === "quiet_runup" ? "横盘拉伸" : (isQuietBreakout ? "横盘异动" : "底部代币异动");
        return {
          id: item.id,
          ts: safeNum(item.ts),
          time: fmtTime(item.ts),
          source: item.source || "",
          status: item.status || "",
          address,
          chain: "sol",
          symbol: extra.symbol || item.title || "UNKNOWN",
          name: "",
          narrative: extra.narrative || extra.narrative_desc || (isQuietBreakout ? `长时间横盘后异动: ${extra.abnormal_rule || ""}` : `底部代币异动: ${extra.abnormal_rule || ""}`),
          mcap: safeNum(extra.current_mcap),
          holders: safeNum(extra.holder_count),
          feeSol: 0,
          tradeVolume: 0,
          priceChange: safeNum(extra.price_change_pct),
          wave: extra.abnormal_rule || "",
          drawdown: 0,
          repeatCount: 1,
          repeatType: bottomVerdict,
          capPath: `ATH $${formatCap(extra.ath_mcap)} → 当前 $${formatCap(extra.current_mcap)}`,
          holderDelta: 0,
          pool: extra.pool_main_exchange || "",
          liquidity: poolLiquidity,
          createdTime: fmtTime(extra.created_ts),
          age: fmtAge(extra.age_sec),
          verdict: bottomVerdict,
          trend: {},
          tags: {
            bottom: {
              count: 1,
              supply: safeNum(extra.accumulation_pct_delta) * 100,
              position_value: safeNum(extra.netflow_usd),
              profit_pct: 0,
              sell_progress: safeNum(extra.distribution_pct_delta) * 100,
            },
          },
          top10: {},
          top100: {},
          bottomProfit: {},
          rawText: item.text || "",
          rawStats: extra,
          isNew: false,
          isBottom: true,
          isQuietBreakout,
          narrativeType: extra.narrative_type || "",
          athMcap: safeNum(extra.ath_mcap),
          abnormalRule: extra.abnormal_rule || "",
          firstSignalMcap: safeNum(extra.first_signal_mcap),
          firstSignalTs: safeNum(extra.first_signal_ts),
          firstSignalTime: fmtTime(extra.first_signal_ts || item.ts),
          firstSignalChangePct: safeNum(extra.first_signal_change_pct),
          firstSignalDeltaMcap: safeNum(extra.first_signal_delta_mcap),
          poolMcapRatio,
          poolMcapRatioText: extra.pool_mcap_ratio_text || "",
          accumulationPct: safeNum(extra.accumulation_pct_delta),
          distributionPct: safeNum(extra.distribution_pct_delta),
          top20Pct: safeNum(extra.top20_pct_delta),
          top50Pct: safeNum(extra.top50_pct_delta),
          top100Pct: safeNum(extra.top100_pct_delta),
          netflowUsd: safeNum(extra.netflow_usd),
          quietRangePct: safeNum(extra.quiet_range_pct),
          quietAvgVolumeUsd: safeNum(extra.quiet_avg_volume_usd),
          breakoutVolumeUsd: safeNum(extra.breakout_volume_usd),
          quietDurationSec: safeNum(extra.quiet_duration_sec),
          historyCount: safeNum(extra.history_count),
          reasons: extra.reasons || [],
        };
      }

      // daily_1m: tokens that crossed $1M, tracked for MCap decline
      if (source === "daily_1m") {
        if (!isRecentDaily1m(item)) return null;
        const address = extra.address || item.ca || "";
        if (!address) return null;
        const mcap = safeNum(extra.current_mcap);
        const peak = safeNum(extra.peak_mcap || mcap);
        const zone = extra.zone || "green";
        const drop = safeNum(extra.drop_from_peak_pct);
        return {
          id: item.id, ts: safeNum(item.ts), time: fmtTime(item.ts),
          source: "daily_1m", status: item.status || "", address, chain: "sol",
          symbol: extra.symbol || item.title || "UNKNOWN",
          name: extra.name || "",
          narrative: extra.narrative || extra.narrative_desc || `峰值${formatCap(peak)} → 当前${formatCap(mcap)} (跌${drop.toFixed(1)}%)`,
          mcap, holders: safeNum(extra.holders),
          feeSol: 0, tradeVolume: 0,
          priceChange: -drop, wave: "", drawdown: 0,
          repeatCount: 1, repeatType: zone === "red" ? "危险区" : (zone === "yellow" ? "观察区" : "安全区"),
          capPath: `峰值 ${formatCap(peak)}`, holderDelta: 0,
          pool: "", liquidity: safeNum(extra.liquidity),
          createdTime: "", age: "", verdict: zone,
          trend: {}, tags: {}, top10: {}, top100: {}, bottomProfit: {},
          rawText: item.text || "", rawStats: extra,
          isNew: false, isBottom: false,
          isDaily1m: true,
          narrativeType: extra.narrative_type || "",
          m1Zone: zone, m1PeakMcap: peak, m1DropPct: drop,
        };
      }

      const stats = extra.stats || {};
      if (!stats || !Object.keys(stats).length) return null;
      const address = item.ca || extra.address || stats.address || "";
      if (!address) return null;
      const repeatCount = safeNum(stats.alert_sequence_no || stats.previous_alert_count || 1) || 1;
      return {
        id: item.id,
        ts: safeNum(item.ts),
        time: fmtTime(item.ts),
        source: item.source || "",
        status: item.status || "",
        address,
        chain: stats.chain || extra.chain || "sol",
        symbol: stats.symbol || "UNKNOWN",
        name: stats.name || "",
        narrative: stats.narrative_desc || stats.narrative || "",
        narrativeType: stats.narrative_type || "",
        mcap: safeNum(stats.mcap),
        holders: safeNum(stats.holder_count),
        feeSol: safeNum(stats.fee_sol),
        tradeVolume: safeNum(stats.trade_volume_usd),
        priceChange: safeNum(stats.price_observation_change_pct),
        wave: stats.price_observation_change_band_text || "",
        drawdown: safeNum(stats.price_observation_drop_pct),
        repeatCount,
        repeatType: stats.repeat_alert_type || (repeatCount > 1 ? "复推" : "首推"),
        capPath: stats.mcap_alert_history_text || "",
        holderDelta: safeNum(stats.holder_count_delta),
        pool: stats.pool_label || "",
        liquidity: safeNum(stats.pool_liquidity),
        createdTime: stats.created_time || "",
        age: stats.created_age || "",
        verdict: stats.verdict || "",
        trend: stats.trend_snapshot || {},
        tags: {
          smart: tag(stats, "smart_degen"),
          kol: tag(stats, "renowned"),
          sniper: tag(stats, "sniper"),
          bundle: tag(stats, "bundler"),
          rat: tag(stats, "rat_trader"),
          fresh: tag(stats, "fresh_wallet"),
          cluster: (stats.holder_tag_stats && stats.holder_tag_stats.same_creation_cluster_summary) || {},
        },
        top10: topSummary(stats, "top10"),
        top100: topSummary(stats, "top100"),
        bottomProfit: stats.bottom_profit_wallets || {},
        rawText: item.text || "",
        rawStats: stats,
        isNew: false,
        isBottom: false,
      };
    }

    function upsertSignal(signal, flash = false) {
      const prev = state.byAddress.get(signal.address);
      if (!prev || signal.ts >= prev.ts) {
        signal.isNew = flash;
        signal.visibleUntilMs = signalBaseMs(signal) + SIGNAL_VISIBLE_MS;
        state.byAddress.set(signal.address, signal);
        if (!state.expandedTokenId) state.expandedTokenId = signal.address;
        if (flash && signal.isBottom) {
          state.pendingBottomAddress = signal.address;
          state.pendingBottomCount += 1;
        }
        if (flash) {
          state.flashed.add(signal.address);
          setTimeout(() => {
            state.flashed.delete(signal.address);
            const current = state.byAddress.get(signal.address);
            if (current) current.isNew = false;
            render();
          }, 3000);
        }
      }
    }

    function allSignals() {
      pruneExpiredSignals();
      return Array.from(state.byAddress.values());
    }

    function matches(signal) {
      const tabMatch = state.tab === "all" ||
        (state.tab === "bottom" && signal.isBottom) ||
        (state.tab === "daily1m" && signal.isDaily1m);
      if (!tabMatch) return false;
      const q = queryInput.value.trim().toLowerCase();
      if (!q) return true;
      return [signal.symbol, signal.name, signal.address, signal.narrative, signal.verdict, signal.pool]
        .join(" ").toLowerCase().includes(q);
    }

    function sortedSignals() {
      const key = sortSelect.value;
      const rows = allSignals().filter(matches);
      const sorters = {
        time_desc: (a, b) => b.ts - a.ts,
        mcap_desc: (a, b) => b.mcap - a.mcap,
        change_desc: (a, b) => b.priceChange - a.priceChange,
        holders_desc: (a, b) => b.holders - a.holders,
      };
      return rows.sort(sorters[key] || sorters.time_desc).slice(0, MAX_VISIBLE_SIGNALS);
    }

    function metric(label, value, cls = "") {
      return `<div class="metric"><span>${label}</span><b class="${cls}">${htmlEscape(value)}</b></div>`;
    }

    const FOCUS_TAG_THRESHOLD = 30;

    function tagHoldPct(data) {
      return safeNum((data || {}).supply);
    }

    function focusTagWarnings(signal) {
      if (!signal || !signal.tags) return [];
      return [
        ["捆绑", signal.tags.bundle],
        ["同批簇", signal.tags.cluster],
        ["老鼠仓", signal.tags.rat],
        ["新钱包", signal.tags.fresh],
      ].map(([label, data]) => ({ label, hold: tagHoldPct(data) }))
        .filter((x) => x.hold >= FOCUS_TAG_THRESHOLD);
    }

    function focusTagBadges(signal) {
      return focusTagWarnings(signal)
        .map((x) => `<span class="badge badge-red focus-tag-badge">重点 ${htmlEscape(x.label)} ${x.hold.toFixed(1)}%</span>`)
        .join("");
    }

    function tagRow(label, data, focus = false) {
      const d = data || {};
      const hold = tagHoldPct(d);
      const isFocus = focus && hold >= FOCUS_TAG_THRESHOLD;
      return `
        <tr class="${isFocus ? "focus-tag-row" : ""}">
          <td>${label}</td>
          <td>${safeNum(d.count || d.wallet_count || d.cluster_count)}</td>
          <td>${hold.toFixed(2)}%${isFocus ? '<span class="focus-tag-note">重点</span>' : ""}</td>
          <td>${formatCap(d.position_value)}</td>
          <td>${formatPct(d.profit_pct || 0)}</td>
          <td>${safeNum(d.sell_progress).toFixed(1)}%</td>
        </tr>`;
    }

    function renderDetailHtml(signal) {
      if (signal.verdict === "ema_golden_cross") {
        return `
          <div class="metric-grid">
            ${metric("市值", formatCap(signal.mcap))}
            ${metric("信号", "EMA 金叉", "green-text")}
            ${metric("强度", htmlEscape(signal.wave || "-"))}
            ${metric("池/市值", `${safeNum(signal.poolMcapRatio * 100).toFixed(1)}%`)}
            ${metric("流动性", formatCap(signal.liquidity))}
            ${metric("EMA26下方", `${htmlEscape(signal.capPath || "-")}`)}
            ${metric("首次信号市值", formatCap(signal.firstSignalMcap || signal.mcap))}
            ${metric("首次信号时间", htmlEscape(signal.firstSignalTime || signal.time || "-"))}
            ${metric("相对首次", formatPct(signal.firstSignalChangePct), signal.firstSignalChangePct >= 0 ? "green-text" : "red-text")}
          </div>
          <section class="detail-section">
            <h3>EMA 9/26 金叉信号</h3>
            <p>EMA9 从下方上穿 EMA26，短期均线开始走强。</p>
            <p>${htmlEscape(signal.reasons[0] || "")}</p>
            <p>${htmlEscape(signal.narrative || "")}</p>
          </section>
        `;
      }

      if (signal.isDaily1m) {
        const zoneColor = signal.m1Zone === "red" ? "red-text" : (signal.m1Zone === "yellow" ? "" : "green-text");
        return `
          <div class="metric-grid">
            ${metric("当前市值", formatCap(signal.mcap), zoneColor)}
            ${metric("峰值市值", formatCap(signal.m1PeakMcap))}
            ${metric("跌幅", `${safeNum(signal.m1DropPct).toFixed(1)}%`, "red-text")}
            ${metric("持有人", safeNum(signal.holders))}
            ${metric("流动性", formatCap(signal.liquidity))}
            ${metric("状态", signal.m1Zone === "red" ? "危险区" : (signal.m1Zone === "yellow" ? "观察区" : "安全区"), zoneColor)}
          </div>
          <section class="detail-section">
            <h3>1M 监控信息</h3>
            <p>该代币曾在 GMGN trending 中跨过 $1M 市值，当前处于${signal.m1Zone === "red" ? "危险区 ($400K-$500K)" : (signal.m1Zone === "yellow" ? "观察区 ($500K-$1M)" : "安全区 (>=$1M)")}</p>
            <p>峰值市值: ${formatCap(signal.m1PeakMcap)} | 当前: ${formatCap(signal.mcap)} | 从峰值下跌: ${safeNum(signal.m1DropPct).toFixed(1)}%</p>
          </section>
        `;
      }

      if (signal.isBottom) {
        return `
          <div class="metric-grid">
            ${metric("当前市值", formatCap(signal.mcap))}
            ${metric("价格变化", formatPct(signal.priceChange), signal.priceChange >= 0 ? "green-text" : "red-text")}
            ${metric("ATH市值", formatCap(signal.athMcap))}
            ${metric("池/市值", `${safeNum(signal.poolMcapRatio * 100).toFixed(1)}% (${htmlEscape(signal.poolMcapRatioText)})`)}
            ${metric("流动性", formatCap(signal.liquidity))}
            ${metric("创建时间", htmlEscape(signal.createdTime || "-"))}
            ${metric("币龄", htmlEscape(signal.age || "-"))}
            ${metric("快照历史", `${safeNum(signal.historyCount)}次`)}
            ${metric("首次异动市值", formatCap(signal.firstSignalMcap || signal.mcap))}
            ${metric("首次异动时间", htmlEscape(signal.firstSignalTime || signal.time || "-"))}
            ${metric("相对首次", formatPct(signal.firstSignalChangePct), signal.firstSignalChangePct >= 0 ? "green-text" : "red-text")}
          </div>
          <div class="metric-grid two">
            ${metric("Top20增持", `${safeNum(signal.top20Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top20Pct * 100).toFixed(2)}%`, safeNum(signal.top20Pct) >= 0 ? "green-text" : "red-text")}
            ${metric("Top50增持", `${safeNum(signal.top50Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top50Pct * 100).toFixed(2)}%`, safeNum(signal.top50Pct) >= 0 ? "green-text" : "red-text")}
            ${metric("Top100增持", `${safeNum(signal.top100Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top100Pct * 100).toFixed(2)}%`, safeNum(signal.top100Pct) >= 0 ? "green-text" : "red-text")}
            ${metric("净买入", formatCap(signal.netflowUsd))}
          </div>
          <section class="detail-section">
            <h3>筹码变化</h3>
            <p>Top20 增持: ${safeNum(signal.top20Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top20Pct * 100).toFixed(2)}%</p>
            <p>Top50 增持: ${safeNum(signal.top50Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top50Pct * 100).toFixed(2)}% | Top100 增持: ${safeNum(signal.top100Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top100Pct * 100).toFixed(2)}%</p>
            <p>净流入: ${formatCap(signal.netflowUsd)}</p>
          </section>
        `;
      }

      const priceClass = signal.priceChange >= 0 ? "green-text" : "red-text";
      return `
        <div class="metric-grid">
          ${metric("市值", formatCap(signal.mcap))}
          ${metric("涨幅", formatPct(signal.priceChange), priceClass)}
          ${metric("持有人", safeNum(signal.holders))}
          ${metric("手续费", `${safeNum(signal.feeSol).toFixed(2)} SOL`)}
          ${metric("交易量", formatCap(signal.tradeVolume))}
          ${metric("回撤", `${safeNum(signal.drawdown).toFixed(1)}%`)}
          ${metric("流动性", formatCap(signal.liquidity))}
        </div>
        <section class="detail-section">
          <h3>走势</h3>
          <p>波段: ${htmlEscape(signal.wave || "-")}</p>
          <p>市值路径: ${htmlEscape(signal.capPath || "-")}</p>
          <p>持有人变化: ${safeNum(signal.holderDelta) >= 0 ? "+" : ""}${safeNum(signal.holderDelta)}</p>
          <p>创建时间: ${htmlEscape(signal.createdTime || "-")} | 状态: ${htmlEscape(signal.verdict || "-")}</p>
        </section>
        <section class="detail-section">
          <h3>热门榜</h3>
          <p>Gas: ${safeNum(signal.trend.gas_fee).toFixed(2)} SOL | 流动性: ${formatCap(signal.trend.liquidity)}</p>
          <p>Rug: ${(safeNum(signal.trend.rug_ratio) * 100).toFixed(1)}% | Wash: ${signal.trend.is_wash_trading ? "是" : "否"} | 捆绑: ${(safeNum(signal.trend.bundler_rate) * 100).toFixed(1)}% | 老鼠仓: ${(safeNum(signal.trend.rat_trader_amount_rate) * 100).toFixed(1)}%</p>
          <p>Smart: ${safeNum(signal.trend.smart_degen_count)} | KOL: ${safeNum(signal.trend.renowned_count)} | 1m ${formatPct(signal.trend.change1m)} | 5m ${formatPct(signal.trend.change5m)} | 1h ${formatPct(signal.trend.change1h)}</p>
        </section>
        <section class="detail-section">
          <h3>标签钱包</h3>
          <table class="mini-table">
            <thead><tr><th>类型</th><th>数量</th><th>持仓</th><th>金额</th><th>盈利</th><th>卖出</th></tr></thead>
            <tbody>
              ${tagRow("聪明钱", signal.tags.smart)}
              ${tagRow("KOL", signal.tags.kol)}
              ${tagRow("捆绑", signal.tags.bundle, true)}
              ${tagRow("老鼠仓", signal.tags.rat, true)}
              ${tagRow("新钱包", signal.tags.fresh, true)}
              ${tagRow("同批簇", signal.tags.cluster, true)}
            </tbody>
          </table>
        </section>
        <section class="detail-section">
          <h3>基础结构</h3>
          <div class="metric-grid two">
            ${metric("Top10持仓", `${safeNum(signal.top10.hold).toFixed(2)}%`)}
            ${metric("Top10盈利", formatPct(signal.top10.profit))}
            ${metric("Top100持仓", `${safeNum(signal.top100.hold).toFixed(2)}%`)}
            ${metric("Top100盈利", formatPct(signal.top100.profit))}
          </div>
        </section>
        <section class="detail-section">
          <h3>底部盈利钱包</h3>
          <p>${htmlEscape(signal.bottomProfit.conclusion || "无结构化结论")}</p>
          <p>盈利钱包: ${safeNum(signal.bottomProfit.count)}个 | 持仓${safeNum(signal.bottomProfit.hold_pct).toFixed(2)}% | 盈利${formatPct(signal.bottomProfit.profit_pct)}</p>
          <p>卖出观察: ${safeNum(signal.bottomProfit.seller_count)}个 | 剩余持仓${safeNum(signal.bottomProfit.seller_hold_pct).toFixed(2)}% | 卖出进度${safeNum(signal.bottomProfit.seller_progress).toFixed(1)}%</p>
        </section>
      `;
    }

    function renderCard(signal) {
      const isExpanded = signal.address === state.expandedTokenId;
      const flashed = state.flashed.has(signal.address) || signal.isNew;
      const priceClass = signal.priceChange >= 0 ? "green-text" : "red-text";
      const expandedClass = isExpanded ? " expanded" : "";
      const flashClass = flashed ? " new-card" : "";
      const bottomClass = signal.isBottom ? " bottom-signal-card" : "";
      const m1Class = signal.isDaily1m ? ` m1-${signal.m1Zone}` : "";
      const quietClass = signal.isQuietBreakout ? " quiet-breakout-card" : "";

      let badges = "";
      if (signal.isDaily1m) {
        const zoneBadge = signal.m1Zone === "red"
          ? '<span class="badge badge-red">危险区</span>'
          : (signal.m1Zone === "yellow" ? '<span class="badge badge-orange">观察区</span>' : '<span class="badge badge-green">安全区</span>');
        badges = zoneBadge;
      } else if (signal.isBottom) {
        if (signal.isQuietBreakout) {
          badges = signal.verdict === "横盘拉伸" ? '<span class="badge badge-red">横盘拉伸</span>' : '<span class="badge badge-red">横盘异动</span>';
        } else if (signal.verdict === "ema_golden_cross") {
          badges = '<span class="badge badge-blue">EMA金叉</span>';
        } else {
          badges = '<span class="badge badge-orange">底部代币异动</span>';
        }
      }
      if (!signal.isDaily1m && !signal.isBottom) {
        badges += focusTagBadges(signal);
      }

      const riskLine = signal.isDaily1m
        ? `<span>峰值 ${formatCap(signal.m1PeakMcap)} · 当前 ${formatCap(signal.mcap)} · 跌${safeNum(signal.m1DropPct).toFixed(1)}%</span>`
        : (signal.isBottom
          ? `<span>ATH ${formatCap(signal.athMcap)} · 池比 ${safeNum(signal.poolMcapRatio * 100).toFixed(1)}% · 首次 ${htmlEscape(signal.firstSignalTime || signal.time || "-")}</span>`
          : `<span>${htmlEscape(signal.verdict || "-")} · Rug ${(safeNum(signal.trend.rug_ratio) * 100).toFixed(1)}% · 捆绑 ${(safeNum(signal.trend.bundler_rate) * 100).toFixed(1)}%</span>`);

      const stat4label = signal.isDaily1m ? "跌幅" : (signal.isBottom ? "池子" : "流动性");
      const stat4value = signal.isDaily1m
        ? `${safeNum(signal.m1DropPct).toFixed(1)}%`
        : formatCap(signal.liquidity);
      const bottomStats = signal.isBottom
        ? `
              <div class="card-stat"><span>创建</span><b>${htmlEscape(signal.createdTime || "-")}</b></div>
              <div class="card-stat"><span>币龄</span><b>${htmlEscape(signal.age || "-")}</b></div>
              <div class="card-stat"><span>Top20增持</span><b class="${safeNum(signal.top20Pct) >= 0 ? "green-text" : "red-text"}">${safeNum(signal.top20Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top20Pct * 100).toFixed(2)}%</b></div>
              <div class="card-stat"><span>Top50增持</span><b class="${safeNum(signal.top50Pct) >= 0 ? "green-text" : "red-text"}">${safeNum(signal.top50Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top50Pct * 100).toFixed(2)}%</b></div>
              <div class="card-stat"><span>Top100增持</span><b class="${safeNum(signal.top100Pct) >= 0 ? "green-text" : "red-text"}">${safeNum(signal.top100Pct * 100) >= 0 ? "+" : ""}${safeNum(signal.top100Pct * 100).toFixed(2)}%</b></div>`
        : "";

      return `
        <article class="card signal-card${bottomClass}${m1Class}${quietClass}${expandedClass}${flashClass}" data-address="${htmlEscape(signal.address)}">
          <div class="card-main" data-action="toggle">
            <div class="card-top">
              <div class="card-title">
                <span class="symbol-name">$${htmlEscape(signal.symbol)}</span>
                ${badges}
              </div>
              <span class="card-time">${htmlEscape(signal.time || "-")}</span>
              <button class="card-close" type="button" data-address="${htmlEscape(signal.address)}" title="移除">✕</button>
            </div>
            <div class="card-subtitle">${htmlEscape(signal.name || signal.verdict || "-")}</div>
            <div class="card-narrative">
              <div class="card-narrative-head">
                <span>叙事</span>
                <button class="narrative-copy-btn" type="button" data-narrative="${htmlEscape(signal.narrative || "")}">复制</button>
              </div>
              <p>${htmlEscape(signal.narrative || "-")}</p>
            </div>
            <div class="card-stats">
              <div class="card-stat"><span>市值</span><b>${formatCap(signal.mcap)}</b></div>
              <div class="card-stat"><span>涨幅</span><b class="${priceClass}">${formatPct(signal.priceChange)}</b></div>
              <div class="card-stat"><span>持有人</span><b>${safeNum(signal.holders)}</b></div>
              <div class="card-stat"><span>${stat4label}</span><b>${stat4value}</b></div>
              ${bottomStats}
            </div>
            <div class="card-risk">${riskLine}</div>
            <div class="card-ca">
              <code class="ca-short" title="${htmlEscape(signal.address)}">${htmlEscape(shortAddress(signal.address))}</code>
              <div class="card-actions">
                <button class="mini-btn copy-btn" type="button" data-address="${htmlEscape(signal.address)}">复制</button>
                <a class="mini-link" href="${htmlEscape(gmgnUrl(signal))}" target="_blank" rel="noreferrer">GMGN</a>
                <a class="mini-link" href="${htmlEscape(binanceUrl(signal))}" target="_blank" rel="noreferrer">Binance</a>
                <a class="mini-link" href="${htmlEscape(solscanUrl(signal))}" target="_blank" rel="noreferrer">Solscan</a>
              </div>
            </div>
            <div class="expand-hint">${isExpanded ? "点击收起 ▲" : "点击展开详情 ▼"}</div>
          </div>
          <div class="card-detail">
            ${renderDetailHtml(signal)}
            <details class="raw"><summary>原始 TG 文本</summary><pre>${htmlEscape(signal.rawText || "")}</pre></details>
          </div>
        </article>`;
    }

    function updateQuickBar() {
      const latest = allSignals().sort((a, b) => b.ts - a.ts)[0];
      if (!latest) {
        quickSymbol.textContent = "-";
        quickAddress.textContent = "等待新消息";
        quickGmgn.href = "https://gmgn.ai/";
        quickDex.href = "https://dexscreener.com/";
        quickCopy.dataset.address = "";
        return;
      }
      quickSymbol.textContent = `$${latest.symbol}`;
      quickAddress.textContent = shortAddress(latest.address);
      quickAddress.title = latest.address;
      quickGmgn.href = gmgnUrl(latest);
      quickDex.href = dexUrl(latest);
      quickCopy.dataset.address = latest.address;
    }

    function updateBottomAlertBanner() {
      const signal = state.pendingBottomAddress ? state.byAddress.get(state.pendingBottomAddress) : null;
      if (!signal || !signal.isBottom || state.pendingBottomCount <= 0) {
        bottomAlertBanner.hidden = true;
        bottomAlertText.textContent = "点击查看最新底部代币异动";
        return;
      }
      bottomAlertBanner.hidden = false;
      bottomAlertText.textContent = `${state.pendingBottomCount}条新底部代币异动 · $${signal.symbol || "UNKNOWN"} · ${shortAddress(signal.address)} · ${formatCap(signal.mcap)}`;
    }

    function render() {
      pruneExpiredSignals();
      const rows = sortedSignals();
      if (state.expandedTokenId && !rows.some((s) => s.address === state.expandedTokenId)) {
        state.expandedTokenId = "";
      }
      grid.innerHTML = rows.map(renderCard).join("");
      empty.hidden = rows.length > 0;
      updateQuickBar();
      updateBottomAlertBanner();
    }

    function activateBottomAlerts() {
      if (state.pendingBottomAddress) {
        state.expandedTokenId = state.pendingBottomAddress;
      }
      state.tab = "bottom";
      state.pendingBottomAddress = "";
      state.pendingBottomCount = 0;
      tabs.forEach((x) => x.classList.toggle("active", x.dataset.tab === "bottom"));
      render();
      grid.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function isTestItem(item) {
      const source = String(item && item.source || "").toLowerCase();
      const status = String(item && item.status || "").toLowerCase();
      const ca = String(item && item.ca || "").toUpperCase();
      return source === "dashboard_test" || status === "test" || ca.startsWith("TEST");
    }

    function pushItem(item, flash = false) {
      if (isTestItem(item)) return;
      if (!item || !item.id || state.seenIds.has(item.id)) return;

      // Handle removal events: delete CA from frontend memory
      if (item.source === "blacklist_removal" || item.source === "deep_alpha_removal" || item.status === "delete") {
        const addr = (item.extra && item.extra.address) || item.ca || "";
        if (addr && state.byAddress.has(addr)) {
          state.byAddress.delete(addr);
          if (state.expandedTokenId === addr) state.expandedTokenId = "";
          state.seenIds.add(item.id);
          render();
        }
        return;
      }
      state.seenIds.add(item.id);
      const signal = normalizeItem(item);
      if (!signal) return;
      signal.visibleUntilMs = signalBaseMs(signal) + SIGNAL_VISIBLE_MS;
      if (isSignalExpired(signal)) return;
      const existingBottomSignal = signal.address && state.byAddress.has(signal.address);
      const silentBottomUpdate = item.source === "bottom_abnormal" && item.status === "frontend_update" && existingBottomSignal;
      upsertSignal(signal, flash && !silentBottomUpdate);
      render();
    }

    function setStatus(cls, text) {
      dot.className = `dot ${cls}`;
      connText.textContent = text;
    }

    async function loadRecent() {
      const resp = await fetch("/api/recent?limit=300");
      const data = await resp.json();
      for (const item of data.items || []) pushItem(item, false);
      render();
    }

    function connect() {
      const es = new EventSource("/events");
      es.addEventListener("open", () => setStatus("ok", "实时监听中"));
      es.addEventListener("ready", () => setStatus("ok", "实时监听中"));
      es.addEventListener("alert", (event) => pushItem(JSON.parse(event.data), true));
      es.addEventListener("error", () => setStatus("bad", "重连中"));
    }

    grid.addEventListener("click", (event) => {
      const closeBtn = event.target.closest(".card-close");
      if (closeBtn) {
        event.preventDefault();
        event.stopPropagation();
        const addr = closeBtn.dataset.address;
        if (addr && state.byAddress.has(addr)) {
          state.byAddress.delete(addr);
          if (state.expandedTokenId === addr) state.expandedTokenId = "";
          render();
        }
        return;
      }
      const copyBtn = event.target.closest(".copy-btn");
      if (copyBtn) {
        event.preventDefault();
        event.stopPropagation();
        copyAddress(copyBtn.dataset.address || "");
        return;
      }
      const narrativeCopyBtn = event.target.closest(".narrative-copy-btn");
      if (narrativeCopyBtn) {
        event.preventDefault();
        event.stopPropagation();
        copyAddress(narrativeCopyBtn.dataset.narrative || "");
        return;
      }
      if (event.target.closest("a")) return;
      if (event.target.closest("details")) return;

      const toggleArea = event.target.closest("[data-action='toggle']");
      if (!toggleArea) return;
      const card = toggleArea.closest(".signal-card");
      if (!card) return;
      const address = card.dataset.address;
      if (state.expandedTokenId === address) {
        state.expandedTokenId = "";
      } else {
        state.expandedTokenId = address;
      }
      render();
    });

    grid.addEventListener("dblclick", (event) => {
      if (event.target.closest("a, button, details")) return;
      const card = event.target.closest(".signal-card");
      if (!card) return;
      const signal = state.byAddress.get(card.dataset.address);
      if (signal) window.open(gmgnUrl(signal), "_blank", "noopener");
    });

    document.addEventListener("click", (event) => {
      const btn = event.target.closest("#quick-copy");
      if (!btn) return;
      event.preventDefault();
      event.stopPropagation();
      copyAddress(btn.dataset.address || "");
    });

    queryInput.addEventListener("input", render);
    sortSelect.addEventListener("change", render);
    tabs.forEach((btn) => {
      btn.addEventListener("click", () => {
        state.tab = btn.dataset.tab;
        if (state.tab === "bottom") {
          state.pendingBottomAddress = "";
          state.pendingBottomCount = 0;
        }
        tabs.forEach((x) => x.classList.toggle("active", x === btn));
        render();
      });
    });
    bottomAlertBanner.addEventListener("click", activateBottomAlerts);
    clearBtn.addEventListener("click", () => {
      state.byAddress.clear();
      state.seenIds.clear();
      state.expandedTokenId = "";
      state.flashed.clear();
      state.pendingBottomAddress = "";
      state.pendingBottomCount = 0;
      render();
    });

    setInterval(() => {
      if (pruneExpiredSignals()) render();
    }, EXPIRE_CHECK_MS);

    loadRecent().finally(connect);
  </script>
</body>
</html>
