services:
  alpha-robot:
    build: .
    container_name: chain-alpha-robot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    command:
      - python
      - sol_token_scanner.py
      - --watch
      - --notify
      - --state-file
      - /app/data/sol_token_scanner_state.json
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
