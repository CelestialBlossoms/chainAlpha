services:
  alpha-robot:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-robot
    restart: unless-stopped
    working_dir: /app
    environment:
      TZ: Asia/Shanghai
      PLUGIN_SIGNAL_STREAM_MAX_AGE_SEC: "21600"
      DEEP_ALPHA_SMART_ONLY_ENABLED: ${DEEP_ALPHA_SMART_ONLY_ENABLED:-1}
      DEEP_ALPHA_SMART_SIGNAL_SCAN_INTERVAL_SEC: ${DEEP_ALPHA_SMART_SIGNAL_SCAN_INTERVAL_SEC:-60}
      DEEP_ALPHA_SMART_SIGNAL_MCAP_MIN: ${DEEP_ALPHA_SMART_SIGNAL_MCAP_MIN:-10000}
      DEEP_ALPHA_SMART_SIGNAL_TRIGGER_MCAP_MIN: ${DEEP_ALPHA_SMART_SIGNAL_TRIGGER_MCAP_MIN:-10000}
      DEEP_ALPHA_SMART_SIGNAL_SELL_TRACK_ENABLED: ${DEEP_ALPHA_SMART_SIGNAL_SELL_TRACK_ENABLED:-1}
      DEEP_ALPHA_SMART_SIGNAL_SELL_TRACK_LIMIT: ${DEEP_ALPHA_SMART_SIGNAL_SELL_TRACK_LIMIT:-200}
      DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_ENABLED: ${DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_ENABLED:-1}
      DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_PAD_SEC: ${DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_PAD_SEC:-60}
      DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_MAX_WORKERS: ${DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_MAX_WORKERS:-6}
      DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_TIMEOUT_SEC: ${DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_TIMEOUT_SEC:-8}
      DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_CACHE_ENABLED: ${DEEP_ALPHA_SIGNAL_POST_PEAK_KLINE_CACHE_ENABLED:-0}
      DEEP_ALPHA_MARKET_SIGNAL_ENABLED: ${DEEP_ALPHA_MARKET_SIGNAL_ENABLED:-1}
      DEEP_ALPHA_MARKET_SIGNAL_REDIS_PREFIX: ${DEEP_ALPHA_MARKET_SIGNAL_REDIS_PREFIX:-deep_alpha:market_signal}
      DEEP_ALPHA_MARKET_SIGNAL_TTL_SEC: ${DEEP_ALPHA_MARKET_SIGNAL_TTL_SEC:-900}
      DEEP_ALPHA_MARKET_SIGNAL_TYPE: ${DEEP_ALPHA_MARKET_SIGNAL_TYPE:-1}
      DEEP_ALPHA_MARKET_SIGNAL_TRIGGER_MCAP_MIN: ${DEEP_ALPHA_MARKET_SIGNAL_TRIGGER_MCAP_MIN:-10000}
      DEEP_ALPHA_MARKET_SIGNAL_TOTAL_FEE_MIN: ${DEEP_ALPHA_MARKET_SIGNAL_TOTAL_FEE_MIN:-2}
      DEEP_ALPHA_MARKET_SIGNAL_MAX_DRAWDOWN_PCT: ${DEEP_ALPHA_MARKET_SIGNAL_MAX_DRAWDOWN_PCT:-50}
    volumes:
      - .:/app
      - ./data:/app/data
    command:
      - python
      - -m
      - deep_alpha.deep_alpha_pro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
