services:
  alpha-robot:
    image: chain-alpha-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chain-alpha-robot
    restart: unless-stopped
    working_dir: /app
    environment:
      TZ: Asia/Shanghai
      DEEP_ALPHA_PLUGIN_NEW_1M_ENABLED: "1"
      PLUGIN_SIGNAL_STREAM_MAX_AGE_SEC: "3600"
    volumes:
      - .:/app
      - ./data:/app/data
    command:
      - python
      - deep_alpha_pro.py
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
